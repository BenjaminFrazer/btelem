name: rust

on:
  push:
    paths:
      - 'viewer/**'
      - '.github/workflows/rust.yml'
      - 'src/**'
      - 'include/**'
      - 'tests/test_counter_server.c'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'viewer/**'
      - '.github/workflows/rust.yml'
      - 'src/**'
      - 'include/**'
      - 'tests/test_counter_server.c'
      - 'CMakeLists.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev cmake
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: viewer
      - name: Build C side (counter server for ingest tests)
        run: make build
      - name: Rust fmt
        working-directory: viewer
        run: cargo fmt --all -- --check
      - name: Rust clippy
        working-directory: viewer
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        working-directory: viewer
        run: cargo test --workspace
      - name: Soak (5s, headless)
        working-directory: viewer
        run: |
          cargo run -p xtask --release -- replay \
            --addr 127.0.0.1:14041 \
            --duration 5 \
            --spawn ../build/btelem_test_counter_server \
            --spawn-entries 5000000 \
            | tee soak.json
          python3 -c "
          import json, sys
          m = json.load(open('soak.json'))
          assert m['channels'] == 8, m
          assert m['total_samples'] > 1000, m
          assert m['samples_per_sec'] > 100, m
          # query latency budget: 60Hz GUI = 16ms/frame, allow up to 5ms p99 for queries.
          assert m['query_p99_us'] < 5000, m
          print('soak ok:', m)
          "
